<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resident Evil Portal - Characters</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <div class="logo">
            <a href="index.html">
                <img src="logo.png" alt="RE Portal Logo" class="site-logo">
            </a>
        </div>
        <div class="burger-menu" id="burger">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <nav class="main-nav" id="nav-links">
            <ul>
                <li><a href="index.html" class="ghost-btn">Home</a></li>
                <li><a href="games.html" class="ghost-btn">Games</a></li>
                <li><a href="characters.html" class="active">Characters</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero" style="min-height: 150px; padding-top: 120px; padding-bottom: 20px;">
        <div class="hero-overlay"></div>
        <h2 class="hero-title">Main Characters</h2>
        </section>

        <section class="characters-section">
            <div class="characters-grid" style="margin-top: -70px;">
                <a href="characters/leon.html" class="character-link">
                    <div class="character-card">
                        <img src="media/characters/leon.webp" alt="Character 1" class="character-img">
                        <div class="character-info">
                            <h3>Leon</h3>
                            <p></p>
                        </div>
                    </div>
                </a>
                <a href="characters/grace.html" class="character-link">
                    <div class="character-card">
                        <img src="media/characters/grace.avif" alt="Grace Ashcroft" class="character-img">
                        <div class="character-info">
                            <h3>Grace Ashcroft</h3>
                            <p></p>
                        </div>
                    </div>
                </a>
                <a href="characters/jill.html" class="character-link">
                    <div class="character-card">
                        <img src="media/characters/jill.jpg" alt="Jill Valentine" class="character-img">
                        <div class="character-info">
                            <h3>Jill Valentine</h3>
                            <p></p>
                        </div>
                    </div>
                </a>
                <a href="characters/ashley.html" class="character-link">
                    <div class="character-card">
                        <img src="media/characters/ashley.jpg" alt="Character 4" class="character-img">
                        <div class="character-info">
                            <h3>Ashley Graham</h3>
                            <p></p>
                        </div>
                    </div>
                </a>
                <a href="characters/nemesis.html" class="character-link">
                    <div class="character-card">
                        <img src="media/characters/nemesis.png" alt="Nemesis" class="character-img">
                        <div class="character-info">
                            <h3>Nemesis</h3>
                            <p></p>
                        </div>
                    </div>
                </a>
                <a href="characters/ada.html" class="character-link">
                    <div class="character-card">
                        <img src="media/characters/wong.jpg" alt="Character 6" class="character-img">
                        <div class="character-info">
                            <h3>Ada Wong</h3>
                            <p></p>
                        </div>
                    </div>
                </a>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="footer-col">
            <img src="logo.png" alt="RE Portal Logo" class="site-logo-footer">
            <p>The biggest fan portal dedicated to the Resident Evil universe.</p>
        </div>
        <div class="footer-col">
            <h3>Quick Links</h3>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="games.html">Games</a></li>
                <li><a href="characters.html">Characters</a></li>
            </ul>
        </div>
        <div class="footer-col">
            <h3>Contact Us</h3>
            <form class="contact-form">
                <input type="text" class="email-input" placeholder="Your email...">
                <input type="text" class="message-input" placeholder="Your message...">
                <button type="submit" class="submit-btn">Send</button>
            </form>
        </div>
    </footer>
    <div class="copyright">
        <p>© 2026 RE Portal. All rights reserved.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
